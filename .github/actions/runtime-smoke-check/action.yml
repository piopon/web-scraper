name: Runtime Smoke Check
description: Start MongoDB and app containers, wait for app healthcheck, and always clean up.
inputs:
  imageName:
    description: Docker image to run for smoke validation.
    required: true
  mongoImage:
    description: MongoDB image used for runtime smoke validation.
    required: false
    default: "mongo:4.4.29-focal"
  timeoutSeconds:
    description: Max seconds to wait for healthy status.
    required: false
    default: "120"
runs:
  using: composite
  steps:
    - name: Compute runtime resource names
      id: runtime-names
      uses: ./.github/actions/compute-runtime-resource-names
      with:
        prefix: smoke
    - name: Ensure Docker network exists
      uses: ./.github/actions/create-docker-network
      with:
        networkName: ${{ steps.runtime-names.outputs.networkName }}
    - name: Start MongoDB and wait
      uses: ./.github/actions/start-mongo-and-wait
      with:
        networkName: ${{ steps.runtime-names.outputs.networkName }}
        mongoName: ${{ steps.runtime-names.outputs.mongoName }}
        mongoImage: ${{ inputs.mongoImage }}
        timeoutSeconds: ${{ inputs.timeoutSeconds }}
        contextLabel: smoke
    - name: Start app and wait for health
      uses: ./.github/actions/start-app-and-optionally-wait
      with:
        networkName: ${{ steps.runtime-names.outputs.networkName }}
        mongoName: ${{ steps.runtime-names.outputs.mongoName }}
        appName: ${{ steps.runtime-names.outputs.appName }}
        imageName: ${{ inputs.imageName }}
        timeoutSeconds: ${{ inputs.timeoutSeconds }}
        waitForHealth: "true"
        jwtSecret: smoke-jwt
        ciUserEmail: ci@test.local
    - name: Run runtime smoke validation
      shell: bash
      run: |
        set -euo pipefail

        STATUS_URL="http://127.0.0.1:5000/api/v1/status"
        STATUS_BODY_FILE="$(mktemp)"

        STATUS_CODE=$(curl -sS -o "$STATUS_BODY_FILE" -w "%{http_code}" "$STATUS_URL")
        if [ "$STATUS_CODE" != "200" ]; then
          echo "Runtime smoke check failed: status endpoint returned HTTP $STATUS_CODE"
          cat "$STATUS_BODY_FILE" || true
          exit 1
        fi

        node -e "const fs=require('node:fs'); const file=process.argv[1]; let payload; try { payload=JSON.parse(fs.readFileSync(file,'utf8')); } catch (err) { console.error('Runtime smoke check failed: status response is not valid JSON.'); process.exit(1); } if (!payload || typeof payload !== 'object') { console.error('Runtime smoke check failed: status payload is not an object.'); process.exit(1); } if (!('app' in payload)) { console.error('Runtime smoke check failed: status payload is missing app field.'); process.exit(1); } if (!('version' in payload)) { console.error('Runtime smoke check failed: status payload is missing version field.'); process.exit(1); } if (!Array.isArray(payload.components)) { console.error('Runtime smoke check failed: status payload is missing components array.'); process.exit(1); }" "$STATUS_BODY_FILE"

        echo "Runtime smoke check passed."
    - name: Cleanup smoke runtime
      if: ${{ always() }}
      shell: bash
      run: |
        docker rm -f "${{ steps.runtime-names.outputs.appName }}" "${{ steps.runtime-names.outputs.mongoName }}" >/dev/null 2>&1 || true
        docker network rm "${{ steps.runtime-names.outputs.networkName }}" >/dev/null 2>&1 || true
