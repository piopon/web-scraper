name: Start Mongo And Wait
description: Start a MongoDB container on a Docker network and wait until ping succeeds.
inputs:
  networkName:
    description: Docker network where MongoDB should run.
    required: true
  mongoName:
    description: Container name for MongoDB.
    required: true
  mongoImage:
    description: MongoDB image used for validation.
    required: false
    default: "mongo:4.4.29-focal"
  timeoutSeconds:
    description: Max seconds to wait for MongoDB readiness.
    required: false
    default: "180"
  contextLabel:
    description: Label used in logs to identify caller context.
    required: false
    default: "validation"
runs:
  using: composite
  steps:
    - name: Start MongoDB and wait for readiness
      shell: bash
      run: |
        set -euo pipefail

        NETWORK_NAME="${{ inputs.networkName }}"
        MONGO_NAME="${{ inputs.mongoName }}"
        MONGO_IMAGE="${{ inputs.mongoImage }}"
        CONTEXT_LABEL="${{ inputs.contextLabel }}"

        docker run -d --name "$MONGO_NAME" --network "$NETWORK_NAME" \
          -e MONGO_INITDB_ROOT_USERNAME=smoke \
          -e MONGO_INITDB_ROOT_PASSWORD=smoke \
          "$MONGO_IMAGE" >/dev/null

        MONGO_SHELL=""
        if docker exec "$MONGO_NAME" sh -c 'command -v mongosh >/dev/null 2>&1'; then
          MONGO_SHELL="mongosh"
        elif docker exec "$MONGO_NAME" sh -c 'command -v mongo >/dev/null 2>&1'; then
          MONGO_SHELL="mongo"
        else
          echo "MongoDB $CONTEXT_LABEL image does not provide mongosh or mongo shell; cannot run readiness probe."
          docker logs "$MONGO_NAME"
          exit 1
        fi

        echo "Using MongoDB shell for readiness probe: $MONGO_SHELL"

        MONGO_READY_ATTEMPTS=$(( ${{ inputs.timeoutSeconds }} / 2 ))
        if [ "$MONGO_READY_ATTEMPTS" -lt 1 ]; then
          MONGO_READY_ATTEMPTS=1
        fi

        for attempt in $(seq 1 "$MONGO_READY_ATTEMPTS"); do
          if docker exec "$MONGO_NAME" "$MONGO_SHELL" --quiet \
              --username smoke \
              --password smoke \
              --authenticationDatabase admin \
              --eval 'db.runCommand({ ping: 1 }).ok' admin >/dev/null 2>&1; then
            echo "MongoDB is ready."
            break
          fi

          if [ "$attempt" -eq "$MONGO_READY_ATTEMPTS" ]; then
            echo "MongoDB readiness check timed out."
            docker logs "$MONGO_NAME"
            exit 1
          fi

          sleep 2
        done
