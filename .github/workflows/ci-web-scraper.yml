# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI web-scraper

on:
  pull_request:
    branches: 'main'

env:
  CHROME_DEVEL_SANDBOX: /opt/google/chrome/chrome-sandbox

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18.x', '20.x', '22.x']
    steps:
    - name: Checkout the project repository
      uses: actions/checkout@v4
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Clean install project and get needed packages
      run: npm ci
    - name: Build project to browser executable code
      run: npm run build --if-present
    - name: Set Chromium sandbox mode to be executed as root
      if: runner.os == 'Linux'
      run: sudo chmod 4755 /opt/google/chrome/chrome-sandbox
    - name: Run CI tests for project
      run: npm test

  bruno:
    name: Bruno API tests
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.BRUNO_CONFIG_TOKEN != '' && secrets.BRUNO_DATA_TOKEN != '' }}
    steps:
    - name: Checkout the project repository
      uses: actions/checkout@v4
    - name: Setup Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
    - name: Sync VERSION for Bruno validation
      run: npm run version:sync
    - name: Build Docker image (Bruno check)
      run: docker build --tag web-scraper:bruno .
    - name: Run Bruno API checks
      uses: ./.github/actions/run-bruno-tests
      with:
        imageName: web-scraper:bruno
        mongoImage: mongo:4.4.29-focal
        timeoutSeconds: 180
        collectionPath: docs/requests
        environmentFile: docs/requests/environments/web-scraper.bru
        configToken: ${{ secrets.BRUNO_CONFIG_TOKEN }}
        dataToken: ${{ secrets.BRUNO_DATA_TOKEN }}
