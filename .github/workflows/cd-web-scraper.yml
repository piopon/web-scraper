# This workflow will publish web-scraper release artifacts
# Primary artifact: GHCR container image
# Secondary artifact: GitHub Release archive (.tar.gz)

name: CD web-scraper

on:
  release:
    types: [published]

jobs:
  validate:
    name: Validate Release Runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run test suite
        run: npm test
      - name: Build Docker image (smoke check)
        run: docker build --tag web-scraper:smoke .

  build:
    name: Publish Release Artifacts
    needs: validate
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize release tag
        id: tag
        uses: ./.github/actions/normalize-release-tag
        with:
          rawTag: ${{ github.event.release.tag_name }}
      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.normalizedTag }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
      - name: Sync VERSION for release artifacts
        run: npm run version:sync
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Create release bundle and upload workflow artifact
        id: bundle
        uses: ./.github/actions/create-release-bundle
        with:
          bundleTag: ${{ steps.tag.outputs.normalizedTag }}
          retentionDays: 14
      - name: Attach archive to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.archiveName }}
